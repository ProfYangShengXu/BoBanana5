description: 'Backend developer: server architecture, API design, database, performance
  optimization. Go/Python/Java'
input_contract:
- description: Task input for backend-dev
  name: task_input
  required: true
  type: object
- description: PRD acceptance criteria to fulfill
  name: acceptance_criteria
  required: true
  type: object[]
- description: Previous role handoff ticket with context
  name: handoff_context
  required: false
  type: object
name: backend-dev
output_contract:
- description: Implementation code/files produced by backend-dev
  name: implementation
  type: object
- description: Test results (normal/boundary/adversarial paths)
  name: test_results
  type: object[]
- description: Risk annotations per 7-dimension framework
  name: risk_notes
  type: object[]
quality_gates:
- check: Verify acceptance list
  desc: All acceptance criteria covered
  id: BACK-Q1
  layer: U
- check: grep for TODO/FIXME
  desc: No dead code or empty functions
  id: BACK-Q2
  layer: U
- check: Line count check
  desc: Each function <= 30 lines
  id: BACK-Q3
  layer: U
standards_file: SKILL.md
tags: []

use_case: "适合后端API和数据库开发，替代fullstack-dev的后端工作"
