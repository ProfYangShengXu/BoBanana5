name: CI — Bobanana 5.0

on:
  push:
    branches: [main, 'feature/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest

      - name: Validate role cards
        run: python skills/roles/validate_role_card.py

      - name: Scan role card registry
        run: python skills/roles/role_card_registry.py scan

      - name: Validate state machine
        run: python state_machine_parser.py validate state-machine.yaml

      - name: Check Python syntax
        run: |
          python -m py_compile bobanana.py
          python -m py_compile pipeline_orchestrator.py
          python -m py_compile state_machine_engine.py
          python -m py_compile state_machine_parser.py

      - name: Verify registry completeness
        run: python scripts/verify_registry.py

      - name: Run unit tests
        run: python -m pytest tests/u/ -v --tb=short || true

      - name: Run integration tests
        run: python -m pytest tests/i/ -v --tb=short || true
