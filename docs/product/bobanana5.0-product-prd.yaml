      dependencies: "OpenAI API key"
      rating: "4.2/5"
    - product: "LangGraph"
      install_steps: 2
      first_use_min: "10-30"
      dependencies: "LangSmith key"
      rating: "3.5/5"
    - product: "ChatDev 2.0"
      install_steps: 4
      first_use_min: "10-20"
      dependencies: "Node.js, Python"
      rating: "3.6/5"
  gaps:
    - description: "跨 session 状态机编排 — LangGraph 有但门槛高，CrewAI 无"
    - description: "可插拔角色卡生态 — 类似 VSCode 插件市场，竞品都无"
    - description: "CL 质量门机制 — 所有竞品缺乏交付质量门"
    - description: "结构化交接工单 — 竞品都是纯自然语言消息传递"
    - description: "零外部依赖 — 对比竞品需要 Docker/Node.js"

positioning:
  plans:
    - name: "方案 A（推荐）"
      target: "使用 AI 辅助开发的程序员和产品团队"
      problem: "AI 无法自主完成长任务、跨 session 上下文丢失、输出不可控"
      differentiation: "唯一支持可编程状态机跨 session 编排 + CL 质量门 + 可插拔角色卡"
      one_liner: "Bobanana 帮你组建 AI 团队——编排角色、打通 session、把关质量。"
      opposition: "LangGraph 用户会质疑状态机能力，CrewAI 用户觉得安装不够简单"
    - name: "方案 B"
      target: "被 AI 工具碎片化困扰的技术管理者"
      problem: "AI 工具各自为战，没有统一的质量体系"
      differentiation: "AI 团队的 Kubernetes——统一编排、统一质量门"
      one_liner: "AI 工具的 Kubernetes——编排 Agent、管理管线、确保交付质量。"
      opposition: "编排层概念太抽象"
    - name: "方案 C"
      target: "想自定义 AI 工作流的进阶用户"
      problem: "管线角色固定不能自定义"
      differentiation: "21 张角色卡 + 可编写新角色 + 可插拔适配集"
      one_liner: "像搭积木一样搭 AI 管线——定义角色、编排流程、把质量。"
      opposition: "非技术用户无法零代码使用"

review_checklist:
  items:
    - question: "用户真的需要多 Agent 编排还是只需要更好的聊天助手？"
      reason: "避免为不需要的功能做产品"
    - question: "跨 session 是真实问题还是工程师想象？"
      reason: "需要确认目标用户群是否感同身受"
    - question: "用户愿意花多少时间学习角色卡和状态机概念？"
      reason: "CrewAI 成功的原因是角色概念直观"
    - question: "CL 终审 9 分门槛是不是太高？会不会永远过不了？"
      reason: "频繁打回会让用户失去耐心"
    - question: "安装需要 Reasonix 前置依赖，用户能接受吗？"
      reason: "增加使用门槛"
    - question: "Kitsets 冷启动——第一个适配集谁来写？"
      reason: "没有适配集就没有领域差异化"
    - question: "非技术用户能否从 Bobanana 获得价值？"
      reason: "先聚焦开发者再拓展"
    - question: "与 Reasonix 绑定是加分还是风险？"
      reason: "平台绑定双刃剑"

summary: "Bobanana 5.0 是跨 session 的 Meta Agent 编排引擎：用可编程状态机编排 AI 角色，用 CL 质量门确保交付，用角色卡生态适配任意领域。"
