name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - run: python state_machine_parser.py validate state-machine.yaml
      - run: python scripts/verify_registry.py
      - run: python -m unittest tests.u.test_handoff tests.i.test_state_machine_engine tests.u.test_registry tests.i.test_schema_compliance tests.chaos.test_resilience tests.perf.test_benchmark tests.security.test_scan tests.s.test_pipeline_e2e tests.i.test_pipeline_deep tests.e2e.test_pipeline_full tests.e2e.test_multi_round -v || true
