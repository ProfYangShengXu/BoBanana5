interview:
  target_users:
    - "AI 开发者 / 技术 Lead — 使用 AI 辅助开发，需要多 Agent 协作和长任务编排"
    - "产品 / 项目经理 — 用 AI 做需求分析、文档生成，需要质量门"
    - "领域专家（非技术）— 游戏策划、数据分析师，想让 AI 按行业标准干活"
  recruitment_criteria:
    - "过去 3 个月内使用过至少一种 AI 编程工具"
    - "有至少一次 AI 做了但不可用的经历"
    - "每周使用 AI 工具 ≥ 3 次"
  questions:
    - q: "你目前在用什么 AI 工具辅助开发/工作？每天用多久？"
      type: "open"
    - q: "描述一次 AI 帮你完成复杂任务的经历。成功/失败的原因是什么？"
      type: "behavioral"
    - q: "AI 输出代码/文档后，你一般花多少时间检查和修改？"
      type: "quantitative"
    - q: "有没有遇到过 AI 做了一半丢了/前后不一致的情况？"
      type: "behavioral"
    - q: "如果 AI 可以有角色，你最想要什么角色？"
      type: "opinion"
    - q: "你愿意让 AI 自动推进 3 小时以上的长任务链吗？担心什么？"
      type: "opinion"
    - q: "你对 AI 产出质量的最低要求是几分（1-10）？"
      type: "quantitative"
    - q: "有你希望 AI 做但现有工具做不到的事情吗？"
      type: "open"
    - q: "你愿意为 AI 团队协作工具付费吗？每月多少？"
      type: "pricing"
    - q: "还有什么想说的？"
      type: "open"

value_proposition:
  canvas:
    - task: "用 AI 完成完整软件开发任务"
      pain: "现有工具单 session，长任务无法保持一致性"
      gain: "跨 session 自动流转"
      solution: "可编程状态机编排，每角色独立 session，queue_next_prompt 推进"
    - task: "让 AI 按质量门标准产出"
      pain: "AI 产出质量波动大，需要人工大量审查"
      gain: "内置质量门减少人工审查"
      solution: "CL 终审机制，隔离 subagent 评分 ≥ 9 才放行"
    - task: "自定义 AI 团队角色"
      pain: "现有框架角色固定"
      gain: "按项目需要组 AI 团队"
      solution: "角色卡系统，21 张预制 + 可编写新角色卡"
    - task: "跨领域复用工作流"
      pain: "换领域要重学重配"
      gain: "换领域只换适配集"
      solution: "Adaption Kitsets，领域知识外置，核心编排层不变"

hypotheses:
  - id: "H1"
    description: "跨 session 编排是真实痛点——开发者在长任务中最大痛点是上下文丢失"
    validation: "访谈 Q4 + 社区帖子分析"
    success_criteria: "≥ 60% 受访者确认遇到并认为严重"
    time_window: "MVP 发布前"
    owner: "产品团队"
  - id: "H2"
    description: "CL 质量门能提升用户对 AI 产出的信任"
    validation: "A/B 测试有/无 CL 的交付质量"
    success_criteria: "有 CL 的人工评分平均高 1.5 分（10 分制）"
    time_window: "MVP 后 1 个月"
    owner: "产品 + 测试"
  - id: "H3"
    description: "角色卡生态驱动采用"
    validation: "GitHub 角色卡提交/下载量"
    success_criteria: "3 个月内 ≥ 5 个社区角色卡或 ≥ 2 个适配集"
    time_window: "上线后追踪"
    owner: "产品 + 社区运营"
  - id: "H4"
    description: "开发者愿意为编排层而非模型层付费"
    validation: "访谈 Q9 + 定价页转化率"
    success_criteria: "≥ 20% 受访者愿意付费 ≥ $10/月"
    time_window: "企业版上线前"
    owner: "产品 + 增长"

