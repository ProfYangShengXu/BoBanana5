description: 数据平台开发工程师：数据平台架构设计与开发，OLAP引擎集成，数据血缘与元数据管理，任务调度系统，数据自助查询平台
input_contract:
- description: 传递给 data-platform-dev 的任务输入
  name: task_input
  required: true
  type: object
- description: data-platform-dev 需满足的 PRD acceptance 标准
  name: acceptance_criteria
  required: true
  type: object[]
- description: 上一个角色的交接工单上下文
  name: handoff_context
  required: false
  type: object
name: data-platform-dev
output_contract:
- description: data-platform-dev 的实现产出（代码/设计/配置）
  name: implementation
  type: object
- description: 测试结果（normal/boundary/adversarial 三路径）
  name: test_results
  type: object[]
- description: 7 维风险评估标注
  name: risk_notes
  type: object[]
quality_gates:
- check: 逐条核对 PRD acceptance
  desc: 所有 acceptance 已覆盖实现
  id: DATA-Q1
  layer: U
- check: grep TODO/FIXME/dead code
  desc: 无空壳函数和死代码
  id: DATA-Q2
  layer: U
- check: 行数检查
  desc: 每个函数 <= 30 行
  id: DATA-Q3
  layer: U
standards_file: standards-brief.yaml
tags: []

use_case: "适合数据平台架构和OLAP引擎集成"
