version: 15
entry_point: "boss"
max_loops: 50

# Godot 游戏开发工具集 — 无 CL 版状态机
# 目标：集成 Godot 工具集 + 创建游戏工作室角色卡 + 通信插件

nodes:
  - id: "boss"
    tags:
      - "OP"
    is_op_role: true
    description: "Boss — 需求文档 + PRD + 本状态机"
  - id: "game-architect"
    tags:
      - "OP"
    is_op_role: true
    description: "游戏架构师(OP) — 游戏开发工具集架构设计、管线编排"
  - id: "hr-recruiter"
    tags: []
    description: "HR 招聘 — 创建 40+ 游戏工作室角色卡 + game-architect OP 角色卡"
  - id: "godot-kitset-dev"
    tags: []
    description: "Godot Kitset 开发 — 从 Godot-adaption-kitset 迁移到 kitsets/godot/"
  - id: "godot-plugin-dev"
    tags: []
    description: "Godot 通信插件开发 — addons/godox/ WebSocket JSON-RPC 双向通信"
  - id: "code-reviewer"
    tags: []
    description: "代码审查 — 审查 kitset 迁移+插件+角色卡"
  - id: "test-dev-engineer"
    tags: []
    description: "测试 — 通信插件测试 + 角色卡验证 + 集成测试"
  - id: "security-engineer"
    tags: []
    description: "安全审查 — Godot 插件通信安全、WebSocket 安全"

edges:
  - from: "boss"
    to: "game-architect"
    phase: "boss-done"

  - from: "game-architect"
    to: "hr-recruiter"
    phase: "arch-design-done"

  - from: "hr-recruiter"
    to: "godot-kitset-dev"
    phase: "roles-ready"

  - from: "godot-kitset-dev"
    to: "godot-plugin-dev"
    phase: "kitset-migrated"

  - from: "godot-plugin-dev"
    to: "code-reviewer"
    phase: "plugin-done"

  - from: "code-reviewer"
    to: "godot-plugin-dev"
    phase: "cr-fail"
  - from: "code-reviewer"
    to: "test-dev-engineer"
    phase: "cr-pass"

  - from: "test-dev-engineer"
    to: "security-engineer"
    phase: "test-all-pass"
  - from: "test-dev-engineer"
    to: "game-architect"
    phase: "test-fail"

  - from: "security-engineer"
    to: "game-architect"
    phase: "security-done"

  - from: "game-architect"
    to: "__terminal__"
    phase: "arch-gate-pass"
  - from: "game-architect"
    to: "hr-recruiter"
    phase: "arch-gate-fail"
