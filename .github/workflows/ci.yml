name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - run: python state_machine_parser.py validate state-machine.yaml
      - name: Run tests
        run: |
          set +e
          python -m unittest tests.u.test_handoff -v
          python -m unittest tests.u.test_registry -v
          python -m unittest tests.i.test_state_machine_engine -v
          python -m unittest tests.i.test_schema_compliance -v
          python -m unittest tests.chaos.test_resilience -v
          python -m unittest tests.perf.test_benchmark -v
          python -m unittest tests.security.test_scan -v
          python -m unittest tests.s.test_pipeline_e2e -v
          python -m unittest tests.i.test_pipeline_deep -v
          python -m unittest tests.e2e.test_pipeline_full -v
          python -m unittest tests.e2e.test_multi_round -v
          set -e
