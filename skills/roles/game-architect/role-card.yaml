name: game-architect
description: 游戏架构师(OP) — 游戏开发管线的架构师：技术选型、管线搭建、工具链编排、质量把关
tags:
- OP
input_contract:
- name: handoff_context
  type: object
  description: 交接工单：上一步角色的产出物和注意事项
  required: true
output_contract:
- name: game-architect_deliverables
  type: object[]
  description: 技术选型、管线搭建、工具链编排、质量把关
  required: true
quality_gates:
- id: GAME-Q1
  desc: 设计文档完整，需求可追溯
  check: 每个需求点都有对应的实现或设计依据
  layer: U
- id: GAME-Q2
  desc: 产出物可验证
  check: 其他角色或工具可以验证该角色的产出
  layer: I
standards_file: SKILL.md
use_case: 适用于游戏开发管线中的游戏架构师(OP)环节
