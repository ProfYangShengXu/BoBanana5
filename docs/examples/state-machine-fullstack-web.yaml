# 全栈 Web 模板 v17-web — 前后端分离 + 数据库 + 测试 + 安全
# 适用场景：大型 Web 项目、多技术栈、前后端分离架构
# 角色数：22 个，覆盖前端/后端/数据库/测试/安全/运维全链路

version: 17
entry_point: "boss"
max_loops: 80

nodes:
  # OP
  - id: "boss"                tags: ["OP"]  is_op_role: true
  - id: "architect"           tags: ["OP"]  is_op_role: true

  # 前端链 (5)
  - id: "web-frontend-dev"    tags: []
  - id: "cross-platform-dev"  tags: []
  - id: "mini-program-dev"    tags: []
  - id: "webgl-visual-dev"    tags: []
  - id: "frontend-infra-dev"  tags: []

  # 后端链 (5)
  - id: "java-backend-dev"    tags: []
  - id: "go-backend-dev"      tags: []
  - id: "python-backend-dev"  tags: []
  - id: "middleware-engineer" tags: []
  - id: "api-gateway-engineer" tags: []

  # 数据库链 (3)
  - id: "dba-engineer"        tags: []
  - id: "nosql-engineer"      tags: []
  - id: "data-warehouse-eng"  tags: []

  # 测试链 (4)
  - id: "code-reviewer"       tags: []
  - id: "unit-test-engineer"  tags: []
  - id: "integration-test-eng" tags: []
  - id: "perf-test-engineer"  tags: []

  # 安全链 (2)
  - id: "pentest-engineer"    tags: []
  - id: "sdl-engineer"        tags: []

  # 运维链 (2)
  - id: "devops-engineer"     tags: []
  - id: "cloud-native-eng"    tags: []

  # 文档 + 出口
  - id: "tech-writer"         tags: []
  - id: "client-gate"         tags: ["CL"]  is_exit: true

edges:
  # 入口
  - from: "boss"              to: "architect"   phase: "boss-done"
  - from: "architect"         to: "architect"   phase: "arch-self-review"

  # 前端链
  - from: "architect"         to: "web-frontend-dev"    phase: "arch-fr-start"
  - from: "web-frontend-dev"  to: "cross-platform-dev"  phase: "web-fr-done"
  - from: "cross-platform-dev" to: "mini-program-dev"   phase: "cross-done"
  - from: "mini-program-dev"  to: "webgl-visual-dev"    phase: "mini-done"
  - from: "webgl-visual-dev"  to: "frontend-infra-dev"  phase: "webgl-done"
  - from: "frontend-infra-dev" to: "code-reviewer"      phase: "infra-done"

  # 后端链
  - from: "architect"         to: "java-backend-dev"    phase: "arch-be-start"
  - from: "java-backend-dev"  to: "go-backend-dev"      phase: "java-done"
  - from: "go-backend-dev"    to: "python-backend-dev"  phase: "go-done"
  - from: "python-backend-dev" to: "middleware-engineer" phase: "py-done"
  - from: "middleware-engineer" to: "api-gateway-engineer" phase: "mw-done"
  - from: "api-gateway-engineer" to: "code-reviewer"    phase: "gw-done"

  # 数据库链
  - from: "architect"         to: "dba-engineer"        phase: "arch-db-start"
  - from: "dba-engineer"      to: "nosql-engineer"      phase: "dba-done"
  - from: "nosql-engineer"    to: "data-warehouse-eng"  phase: "nosql-done"
  - from: "data-warehouse-eng" to: "code-reviewer"      phase: "dw-done"

  # CR 打回
  - from: "code-reviewer"     to: "web-frontend-dev"    phase: "cr-fail-fr"
  - from: "code-reviewer"     to: "java-backend-dev"    phase: "cr-fail-be"
  - from: "code-reviewer"     to: "dba-engineer"        phase: "cr-fail-db"

  # 测试链
  - from: "code-reviewer"     to: "unit-test-engineer"  phase: "cr-pass"
  - from: "unit-test-engineer" to: "integration-test-eng" phase: "unit-done"
  - from: "integration-test-eng" to: "perf-test-engineer" phase: "int-done"
  - from: "unit-test-engineer" to: "code-reviewer"      phase: "unit-fail"

  # 安全链
  - from: "perf-test-engineer" to: "pentest-engineer"   phase: "perf-done"
  - from: "pentest-engineer"  to: "sdl-engineer"        phase: "pentest-done"
  - from: "pentest-engineer"  to: "code-reviewer"       phase: "pentest-fail"

  # 运维链
  - from: "sdl-engineer"      to: "devops-engineer"     phase: "sdl-done"
  - from: "devops-engineer"   to: "cloud-native-eng"    phase: "devops-done"

  # 文档 + 终验
  - from: "cloud-native-eng"  to: "tech-writer"         phase: "cloud-done"
  - from: "tech-writer"       to: "architect"           phase: "docs-done"
  - from: "architect"         to: "client-gate"         phase: "arch-gate-pass"
  - from: "architect"         to: "web-frontend-dev"    phase: "arch-gate-fail-fr"
  - from: "architect"         to: "java-backend-dev"    phase: "arch-gate-fail-be"

  # CL 出口
  - from: "client-gate"       to: "__terminal__"        phase: "cl-pass"  condition: {field: score, operator: ">=", value: 9}
  - from: "client-gate"       to: "architect"           phase: "cl-fail"  condition: {field: score, operator: "<", value: 9}
