name: CI — Bobanana 5.0

on:
  push:
    branches: [main, 'feature/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest
          pip install types-PyYAML 2>/dev/null || true

      - name: Python syntax check
        run: |
          python -m py_compile bobanana.py || echo "warn: bobanana.py syntax"
          python -m py_compile pipeline_orchestrator.py || echo "warn"
          python -m py_compile state_machine_engine.py || echo "warn"
          python -m py_compile state_machine_parser.py || echo "warn"

      - name: Validate state machine
        run: python state_machine_parser.py validate state-machine.yaml

      - name: Verify registry
        run: python scripts/verify_registry.py

      - name: Run unit tests
        run: python -m pytest tests/u/ -v --tb=short || true

      - name: Run integration tests
        run: python -m pytest tests/i/ -v --tb=short || true
