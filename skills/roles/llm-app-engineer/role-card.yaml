description: 大模型应用开发工程师：LLM API 调用与微调，RAG 管线构建，Prompt 工程，Agent 开发，模型评估与监控
input_contract:
- description: 传递给 llm-app-engineer 的任务输入
  name: task_input
  required: true
  type: object
- description: llm-app-engineer 需满足的 PRD acceptance 标准
  name: acceptance_criteria
  required: true
  type: object[]
- description: 上一个角色的交接工单上下文
  name: handoff_context
  required: false
  type: object
name: llm-app-engineer
output_contract:
- description: llm-app-engineer 的实现产出（代码/设计/配置）
  name: implementation
  type: object
- description: 测试结果（normal/boundary/adversarial 三路径）
  name: test_results
  type: object[]
- description: 7 维风险评估标注
  name: risk_notes
  type: object[]
quality_gates:
- check: 逐条核对 PRD acceptance
  desc: 所有 acceptance 已覆盖实现
  id: LLM--Q1
  layer: U
- check: grep TODO/FIXME/dead code
  desc: 无空壳函数和死代码
  id: LLM--Q2
  layer: U
- check: 行数检查
  desc: 每个函数 <= 30 行
  id: LLM--Q3
  layer: U
standards_file: standards-brief.yaml
tags: []

use_case: "适合LLM API调用、RAG管线和Prompt工程"
