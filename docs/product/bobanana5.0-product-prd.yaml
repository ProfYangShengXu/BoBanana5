competitive_ux:
  comparison:
    - product: "Bobanana 5.0"
      install_steps: 2
      first_use_min: "5-10"
      dependencies: "Python 3.12+, Reasonix"
      rating: "N/A"
    - product: "MetaGPT"
      install_steps: 3
