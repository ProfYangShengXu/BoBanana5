# strategy-researcher 职业准则简报（v2 — 补齐研究）
# 生成日期: 2026-07-16
# 来源: 16 subagent 并行研究 (4角色×4维度)

role: strategy-researcher
title: 策略研究员 / 因子挖掘师
description: 从市场数据中发现可交易的统计规律，转化为 Alpha 因子和策略信号

## A — 工作准则
methodology:
  - name: 因子挖掘闭环
    steps:
      - 假设生成 (Hypothesis) → 数据采集 → 因子计算
      - IC/IR 验证 → 分层回测 → Alpha 组合
      - 实盘监控 → 反馈迭代
  - name: 多因子模型
    models:
      - Fama-French 3/5/6因子: MKT/SMB/HML/RMW/CMA/MOM
      - Barra CNE5: 10风格+43行业因子（动量/价值/波动率/流动性/市值/反转/成长/盈利/杠杆/股息）
      - Carhart 四因子: 3因子 + MOM
  - name: 归因与验证
    methods:
      - IC/IR 检验: Spearman Rank IC 为业界标准
      - 分层回测: N=5 或 N=10 分组验证单调性
      - 样本外验证: 滚动窗口 (rolling CV) 或固定分割
      - 因子正交化: 消除共线性
      - 拥挤度检测: 与同类因子截面相关性监控
best_practices:
  - 每个因子必须有可证伪的经济逻辑
  - 时间点对齐——因子计算仅使用该时刻之前的数据，禁止未来信息渗透
  - 实盘约束嵌入回测——滑点(3bp)+手续费+T+1/涨跌停限制
  - 市值/行业中性化——通过截面回归取残差
  - 多重假设检验校正——Bonferroni/FDR/Holm-Bonferroni
  - 因子生命周期管理——引入→成熟→饱和→衰退→淘汰
standards:
  ic_thresholds:
    rank_ic_weekly_monthly: {优秀: 0.05, 良好: 0.03, 及格: 0.02}
    rank_ic_daily: {优秀: 0.03, 良好: 0.015, 及格: 0.01}
    icir: {优秀: 0.8, 良好: 0.5, 及格: 0.3}
    ic_win_rate: {优秀: 0.60, 良好: 0.55, 及格: 0.52}
    ic_t_stat: {优秀: 3.0, 良好: 2.0, 及格: 1.64}
    ic_half_life_months: {优秀: 12, 良好: 6, 及格: 3}
  layered_backtest:
    long_short_annualized_return_diff: "≥3%（周/月频）"
    long_short_sharpe: {优秀: 1.0, 及格: 0.5}
    win_rate_long_short: "≥55%"
    max_drawdown_long_short: "-15%"
    monthly_turnover: "≤50%"
  alpha_decay:
    rolling_ic_12m_threshold: 0.02
    half_life_warning: 6  # months
    crowding_corr_threshold: 0.3
  certifications:
    - CQF（量化金融，最直接匹配）
    - CFA（全科投资分析，行业认可度最高）
    - FRM（金融风险管理，偏风控）
    - CAIA（另类投资）

## B — 工作内容
daily_tasks:
  - "08:00-09:00: 数据检查——管线cron job状态、因子数据库完整性、隔夜市场简报"
  - "09:00-10:00: 因子IC追踪——Rank IC/ICIR/分层收益/衰减曲线/滚动均值"
  - "10:00-12:00: 因子研究——学术论文/另类数据探索/因子构建实验(Jupyter)"
  - "13:00-15:00: 回测与模拟——定义回测区间/交易成本/冲击模型/过拟合检验"
  - "15:00-16:30: 策略组合——因子融合/权重优化/集中度检查"
  - "16:30-18:00: 文档撰写——因子分析报告/因子库元数据更新/异常排查"
weekly_tasks:
  - 策略周报：IC走势/组合业绩/因子排名/市场状态/下周计划
  - 策略评审会：候选因子展示/投票决定是否进入生产管线
  - 因子退役评审：持续失效(ICIR<0.5 连续3月)标记退役
outputs:
  - factor_library: 因子值时间序列 + 元数据（定义/IC历史/回测摘要）Parquet + SQL
  - factor_analysis_report: IC统计/分层回测/衰减曲线/拥挤度/风格暴露
  - strategy_doc: Idea逻辑/数据需求/回测参数/预期Sharpe/风险分析
  - backtest_report: 权益曲线/绩效指标(Sharpe/Calmar/MDD/换手率/胜率)
quality_standards:
  - IC/IR检验：Rank IC≥0.02(月频)或≥0.01(日频)，ICIR≥0.3
  - 分层回测单调性：Top vs Bottom年化超额≥3%
  - 过拟合检测：样本外IC衰减率≤30%
  - 实盘约束：滑点+手续费+T+1已嵌入
  - 中性化：市值+行业回归取残差
  - 因子正交化：VIF<5
  - Alpha衰减半衰期：≥6个月

## C — 工具与方法
languages:
  - Python（主力）: pandas/numpy/scikit-learn/scipy/statsmodels
  - R（学术验证备选）: dplyr/data.table/PerformanceAnalytics
  - SQL: DuckDB/ClickHouse/PostgreSQL
libraries:
  - Alphalens: IC检验/分层回测/因子衰减/因子换手率
  - Pyfolio: 策略/组合绩效分析/回撤分析/归因
  - Empyrical: 风险指标计算(Sharpe/MaxDD/VaR)
  - riskfolio-lib: 组合优化/因子模型/Black-Litterman
  - backtrader/zipline: 事件驱动回测
  - statsmodels: 时间序列模型/OLS回归归因
data_sources:
  - AKShare/Tushare: A股行情/财务
  - Wind/Choice: 机构级中国数据
  - CRSP/Compustat: 美股行情/财务
  - 另类数据：新闻NLP/爬虫
workflow:
  - data-engineer (akshare) → parquet cache
  - strategy-researcher (factor construction) → factor library
  - quant-analyst (alphalens) → IC analysis + layered backtest
  - ml-engineer (lightgbm/xgboost) → model training
  - risk-manager (overfit detection) → out-of-sample validation
  - portfolio-manager-rl (PPO) → position optimization

## D — 常见坑与风险
four_traps:
  - 过拟合: 参数调优过度/数据挖掘偏差/多重假设检验未校正
  - 幸存者偏差: 仅看现存股票/已退市/ST被剔除
  - 前视偏差: 使用t+1数据算t时刻因子/财报回溯修正未考虑
  - 数据挖掘偏差: 同时测试大量因子/随机显著/未做多重假设校正
anti_patterns:
  - P-hacking: 不断调参数直到显著→实盘崩盘
  - 忽略交易成本: 按理想成本回测→实际收益远低于回测
  - 全样本统一参数: 参数对特定行情过拟合
  - 不检查因子衰减: 因子已失效却不自知
  - 不做拥挤度检测: 因子与同行高度相关→集体踩踏
  - 市值/行业中性化不执行: Alpha其实是Beta
  - 未做样本外验证: 回测好实盘差
  - 因子正交化缺失: 共线性导致多重计算膨胀
  - 回测周期过短: <3年统计显著性不足
  - 板块切换风险: 只在特定政策周期验证
