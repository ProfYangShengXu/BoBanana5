product:
  name: "bobanana5.0"
  one_liner: "Meta Agent 编排层 — 领域无关的可编程状态机 + 可插拔角色卡系统。CL(client-gate)为唯一出口，bobanana.py自动弹出仪表盘。"
  created_at: "2026-07-13T18:30:00+08:00"

architecture:
  summary: "三层架构：EUI-NEO 桌面端（C++17 GPU UI）+ 核心编排层（领域无关）+ 外部 Adaption Kitsets（领域专用）"
  core_layer:
    name: "Bobanana 5.0 核心"
    description: "Meta Agent 编排引擎，领域无关。只负责按状态机定义调度 Agent 角色，维护上下文一致性，确保质量门通过。不包含任何领域知识。"
    components:
      - "状态机引擎 — 读取 YAML 定义的状态机配置，驱动 Agent 在角色间流转。支持串行/并行/分支/循环。"
      - "角色卡注册表 — 角色卡的元数据描述库。编排层只读元数据，不执行业务逻辑。"
      - "交接工单系统 — 结构化上下文传递机制。工单含：产出物列表、未决决策、显式假设、风险标注。"
  role_tags:
    description: "每个角色卡可以带一个或多个标签，决定了角色在管线中的层级行为"
    tags:
      - name: "OP"
        full_name: "Orchestration — 编排者标签"
        applies_to:
          - "架构师"
          - "技术经理"
          - "Project Lead"
          - "技术总监"
        behavior: "OP 角色不仅产出领域交付物，还动态编写或更新 state-machine.yaml，包括设置下一个 OP 角色、出口条件、循环/分支逻辑。引擎在 OP session 结束后重新加载状态机配置。"
      - name: "CL"
        full_name: "Client Gate — 甲方终审标签"
        applies_to:
          - "甲方代表"
          - "业务方审核员"
          - "产品总监"
        behavior: "CL 是整个管线的唯一终结出口。在所有技术性角色完成后执行。必须启动一个全新的、隔离的 subagent（无 pipeline 历史上下文）。对整个项目代码全量审查并打分 1-10。分数 < 9 则通过 handoff ticket 打回给最近的 OP 角色；分数 ≥ 9 触发 signal_done。"
      - name: "HR"
        full_name: "招聘专员标签"
        applies_to:
          - "HR 招聘专员"
        behavior: "HR 是一张特殊的服务角色卡，仅响应 OP 的紧急招聘请求。不被用户或其他角色直接调用，不被 OP 选作出口或普通节点。OP 遍历角色卡库发现缺口时在状态机中插入 HR 临时节点，HR 创建角色卡后控制权回到 OP。"
  flow_pipeline:
    description: "完整管线流程：OP 角色动态定义状态机 -> 技术性角色链执行 -> CL 甲方终审"
    stages:
      - "OP 编排阶段：架构师等 OP 角色读取项目目标和可用角色卡，发现缺口时触发紧急招聘（OP->HR->OP），产出 PRD + 任务拆解，动态编写 state-machine.yaml"
      - "紧急招聘阶段：OP 发现角色库缺少所需角色时，在状态机中插入 HR 临时节点，HR 执行 4 subagent 职业研究并生成角色卡，完成后控制权回 OP"
      - "技术执行阶段：按 OP 定义的状态机执行 开发 -> 测试 -> 评判 -> 挑刺 等角色链，有 badcase 则打回修复"
      - "CL 终审阶段：所有技术角色完成后，启动隔离 subagent 做全项目审查和 1-10 打分"
      - "出口判断：分数 < 9 打回给最近 OP 角色；分数 >= 9 signal_done"
  role_research:
    description: "HR Skill 负责在创建角色卡时对一个职业进行深度研究，产出标准化的角色卡文件，立即可在当前管线中使用"
    behavior: "HR Skill 被调用时派出 4 个并行 read-only subagent 研究该职业的工作准则、工作内容、工具方法、常见坑与风险，合并为职业准则简报，产出 role-card.yaml + SKILL.md"
    reference_examples:
      - name: "docs skill"
        role: "产品经理"
        path: "~/.reasonix/skills/docs/SKILL.md"
        content: "定义产品经理的工作方法：不写代码、只回答 WHAT/WHY、输出 HTML+YAML、使用固定模板。HR Skill 可直接引用此文件跳过 subagent 研究。"
      - name: "Bobanana.md"
        role: "架构师 / 开发"
        path: "Bobanana.md"
        content: "定义工程原则：9 条架构原则、禁止面向结果编程、不重构没问题代码。HR Skill 可直接引用此文件跳过 subagent 研究。"
    design_principles:
      - "研究发生在招聘时，不发生在上班时 — 职业研究是一次性的成本，在创建角色卡时完成"
      - "角色卡立即可用 — 写入 skills/roles/ 后状态机引擎立刻能发现它"
      - "预置准则 = 省成本 — 适配集作者可预置准则文件，HR Skill 直接引用不启动 subagent"
  desktop_gui:
    framework: "EUI-NEO"
    url: "https://github.com/sudoevolve/EUI-NEO"
    language: "C++17"
    renderer: "OpenGL / Vulkan (GPU 加速)"
    window_backend: "GLFW / SDL2"
    license: "Apache 2.0"
    communication: "通过 Reasonix MCP 协议（JSON-RPC 2.0 over stdio）与 reasonix.exe 通信"
    hooks:
      - "get_state_machine — 获取状态机拓扑图"
      - "get_role_cards — 获取角色卡库列表"
      - "queue_next_prompt — 推进管线"
      - "signal_done — 管线完成"
      - "get_pipeline_status — 当前进度"
      - "get_handoff_tickets — 交接工单历史"
      - "trigger_hr_recruit — HR 紧急招聘"
      - "get_cl_report — CL 审查报告"
      - "run_skill — 执行 skill"
      - "文件系统: read_file / write_file / grep / glob"
    views:
      - "状态机图：节点=角色卡，边=转换条件，GPU 加速"
      - "OP 编排工作台：拖拽角色卡 -> 画布 -> 连线"
      - "角色卡浏览器：按标签分组，展开详情"
      - "管线仪表盘：进度条 + 计时器 + 工单时间线"
      - "CL 审查面板：10 项打分 + 最终评分"
      - "HR 招聘对话框：输入角色描述，预览研究结果"
  kitset_layer:
    name: "Adaption Kitsets（外部适配集）"
    description: "独立的 Git 仓库，作为外部项目存在。负责提供领域特有的角色定义、工具实现、状态机模板和质量门规则。"
    contents_per_kitset:
      - "角色卡文件 — YAML + Markdown 格式定义本领域角色"
      - "工具实现 — CLI/MCP/脚本工具，Agent 在该领域干活时调用"
      - "预设状态机模板 — 推荐管线拓扑"
      - "质量门规则 — 领域特定验收标准"
      - "文档和模板 — 适配集使用说明 + 新手快速上手模板"
  existing_kitset:
    name: "Godot-adaption-kitset"
    status: "⚪ 已规划，适配集仓库尚未创建（计划重构 bobanana4.0 的 Godot 相关技能为角色卡格式）"
    description: "Godot 4.x 游戏开发适配集，含 4 个 Reasonix skill、11 个 TypeScript 工具模块、Godox 编辑器插件、3 个游戏模板、4 层测试体系"
    note: "代码库中已有 Skills（godot-dev/godot-debug/godot-test/godot-docs），需重构为标准角色卡格式放入独立仓库"

success_metrics:
  north_star: "编排管线完整成功率 ≥ 85%（目标输入 → signal_done，目标轮次内无人工干预）"
  key_results:
    - name: "KR-0"
      description: "代码库全面审查 + 测试覆盖 — 当前工程阶段焦点"
      target: "四层测试覆盖率 ≥ 80%（U/I/S/A），修复仪表盘编译错误"
      measure: "测试覆盖率报告 + 仪表盘编译通过率"
    - name: "KR-1"
      description: "适配集生态 — 覆盖至少 3 个不同领域"
      target: "发布 ≥ 3 个官方适配集（Godot / Web 全栈 / 数据科学）"
      measure: "独立仓库数量 + install.bat 一键接入通过率"
    - name: "KR-2"
      description: "状态机声明式配置 — 不修改核心引擎代码"
      target: "100% 状态机定义可通过 YAML 完成"
      measure: "用户自定义状态机配置测试通过率"
    - name: "KR-3"
      description: "社区贡献适配集"
      target: "每月至少 2 个社区提交的适配集 issue/PR"
      measure: "GitHub issue/PR 标签统计（kitset 标签）"

personas:
  - name: "适配集开发者"
    scenario: "AI 工具开发者/社区贡献者，想为某领域写适配集（游戏开发/Web/数据）"
    pain_point: "写角色卡没有标准格式；角色间上下文传递要自己拼字符串；没有验证器确认格式正确"
    frequency: "周期性地：创建/更新适配集时密集使用"
    need: "让我能用 YAML 定义角色卡，用 YAML 定义状态机，验证器帮我检查定义是否正确"
    tech_level: "高（能写 Go/Python/TypeScript，理解 MCP 协议）"
  - name: "管线高级用户"
    scenario: "深度使用 AI 管线的技术用户，熟悉 Reasonix，想自定义工作流"
    pain_point: "现有管线角色太少、状态机固定；想加专属角色但做不到"
    frequency: "每天使用，经常调整配置和角色组合"
    need: "让我能像搭积木一样搭状态机，像写函数一样写角色卡"
    tech_level: "中-高（了解管线原理，能写 YAML 配置）"
  - name: "端用户（领域专家）"
    scenario: "不懂技术的领域专家（游戏策划/数据分析师），只想用 AI 完成特定产出"
    pain_point: "想让 AI 按自己行业的标准干活，但不知道怎么配置"
    frequency: "每周 3-5 次，使用预制模板，不碰配置"
    need: "给我一个模板，告诉我安装适配集，直接开用"
    tech_level: "低-中（会用命令行安装，不写代码）"

mvp:
  must_have:
    - "角色卡系统（Role Card Registry）：标准化角色卡片格式 YAML Schema，含角色 ID/名称/描述/输入契约/输出契约/适用阶段/标签"
    - "可编程状态机（Programmable State Machine）：YAML 配置文件 state-machine.yaml，支持节点/边/条件分支/并行 fork-join/循环反馈"
    - "交接工单系统（Handoff Ticket）：结构化 JSON 格式上下文传递，含发送者/接收者/产出物列表/未决决策/假设/风险标注，存储在 .reasonix/handoffs/"
    - "角色卡验证器：安装时自动校验角色卡 YAML 格式，不符合 Schema 的给出具体错误位置和修复建议"
    - "状态机图形化输出：每轮角色转换后输出 Mermaid 格式进度图，显示已过/当前/待过角色及重试次数"
    - "向后兼容：bobanana4.0 的 /pipeline、/loop、/cycle 命令继续可用，内置通用软件开发状态机模板"
    - "首个官方适配集（Godot-adaption-kitset）：重构现有实现为角色卡格式，作为参考实现和验证案例"
  role_tag_must_have:
    - "[OP] 编排者标签支持：角色卡 Schema 允许 tags: [op]，OP 角色运行时有权读取和写入 state-machine.yaml，动态添加/删除角色节点和转换边"
    - "[CL] 甲方终审标签支持：角色卡 Schema 允许 tags: [cl]，CL 角色定义为管线的唯一出口"
    - "[CL] 隔离 subagent 审查：到达 CL 角色时引擎自动启动全新隔离 subagent（无 pipeline 历史上下文），从头审查整个项目代码"
    - "[CL] 打分 + 打回机制：CL 强制输出 1-10 整数评分，< 9 分通过 handoff ticket 打回给最近的 OP 角色；≥ 9 分触发 signal_done"
  role_research_must_have:
    - "HR Skill 专用角色：一个专门的 Reasonix skill，负责职业研究 + 角色卡创建，在需要新角色时被调用"
    - "4 子 agent 并行研究：HR Skill 派出 4 个并行 read-only subagent，研究工作准则/工作内容/工具方法/常见坑"
    - "标准角色卡生成：产出 role-card.yaml + SKILL.md，写入 skills/roles/，立即可被管线发现和引用"
    - "可引用已有准则文件：docs skill / Bobanana.md 等预置文件可被 HR Skill 直接引用，跳过 subagent 研究"
    - "一次研究多次使用：职业研究在创建角色卡时一次性完成，角色卡激活后不再重复研究"
  nice_to_have:
    - "角色卡市场 / 适配集仓库索引（从远程拉取）"
    - "GUI 状态机编辑器（拖拽连线）"
    - "角色卡版本管理 + 适配集依赖声明"
    - "管道并行：同一时刻多个 Agent 运行不同角色"
    - "适配集评分 / 质量评级体系"
  out_of_scope:
    - "不内置任何领域的 SDK/编辑器插件/渲染引擎（由适配集提供）"
    - "不做项目管理工具（非 JIRA/Notion 竞品）"
    - "不做 AI 模型训练或微调"
    - "不做无代码平台"

competitors:
  - name: "MetaGPT / ChatDev / AutoGPT"
    positioning: "多 AI agent 协作框架"
    strength: "多 agent 对话、角色扮演"
    weakness: "状态机简单、不支持自定义角色卡、无适配集概念"
    difference: "Bobanana 5.0 强调可编程状态机 + 可插拔角色卡 + 两层架构"
  - name: "LangGraph / LangChain"
    positioning: "Agent 工作流框架"
    strength: "灵活、Python 生态丰富、复杂图状态机"
    weakness: "没有'角色'抽象、没有适配集概念、不面向非 Python 场景"
    difference: "角色卡 + 状态机 = LangGraph 的'信念系统'层之上的抽象"
  - name: "Claude Code / Reasonix 原生"
    positioning: "AI agent 编程框架"
    strength: "强推理、工具链丰富、直接可用"
    weakness: "角色单一、无多角色编排、无跨 session 状态机"
    difference: "Bobanana 5.0 在其上叠加编排层"
  - name: "n8n / Temporal / Airflow"
    positioning: "工作流编排引擎"
    strength: "成熟、可配置、企业级"
    weakness: "不面向 AI Agent 场景、无 LLM 集成、角色概念不同"
    difference: "专注于 AI Agent 的角色化编排"
  - name: "用户自己拼（手动组合各种工具）"
    positioning: "无框架手动实现"
    strength: "高度灵活"
    weakness: "没有标准化框架、重复造轮子、维护成本高"
    difference: "提供标准化的两层架构和开箱即用的适配集"

swot:
  strengths:
    - "已有成熟的 bobanana4.0 管线体系和用户基础"
    - "两层架构设计清晰，核心编排层 + 外部适配集解耦"
    - "已有首个验证案例（Godot-adaption-kitset），证明模式可行"
    - "继承 Reasonix 的跨 session 机制和 MCP 工具生态"
  weaknesses:
    - "状态机从硬编码到可配置需要重构 cycle-bridge 核心组件"
    - "角色卡 Schema 设计要兼顾通用性和表达能力，权衡很关键"
    - "适配集生态冷启动问题——第一个适配集好做，第 N 个需要社区"
    - "项目本身是纯配置+Markdown 仓库，核心引擎代码在 Reasonix 主仓库"
  opportunities:
    - "AI Agent 编排市场快速增长，多角色协作仍是蓝海"
    - "大模型能力提升使多角色专业化分工变得可行"
    - "不同领域对 AI 工具需求在爆发（游戏/数据/嵌入式/设计）"
    - "开源社区对'AI 框架'类项目兴趣浓厚"
  threats:
    - "大厂快速跟进（LangChain/OpenAI 可能出类似编排层）"
    - "'编排层'概念对普通用户太抽象，难以理解价值"
    - "适配集质量参差不齐可能影响核心编排层口碑"
    - "LLM API 价格波动影响使用成本"

risks:
  - category: "市场风险"
    description: "编排层赛道变拥挤，大厂（LangChain/OpenAI）出竞品"
    likelihood: "中"
    impact: "高"
    mitigation: "通过角色卡 + 适配集两层抽象建立差异化壁垒；深耕 bobanana4.0 已有用户基础"
  - category: "认知风险"
    description: "'两层架构'概念对用户太抽象，难以理解核心和适配集的边界"
    likelihood: "高"
    impact: "中"
    mitigation: "用'操作系统/驱动程序'类比；先推完整的适配集，再逐步开放核心能力"
  - category: "生态风险"
    description: "适配集冷启动困难，只有官方适配集，社区不贡献"
    likelihood: "高"
    impact: "高"
    mitigation: "官方同时启动 3 个方向适配集（Godot/Web/Data）作为模板；写详细'如何写适配集'文档；降低贡献门槛"
  - category: "质量风险"
    description: "第三方适配集质量参差不齐，用户归咎于核心编排层"
    likelihood: "中"
    impact: "中"
    mitigation: "角色卡 Schema 验证 + 沙箱执行 + 适配集评分体系 + 官方认证徽章"
