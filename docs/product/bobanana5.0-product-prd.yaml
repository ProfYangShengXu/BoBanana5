      pain: "星多但不知道实际好不好用"
      opportunity: "README 一句话定位清晰"
      emotion: "🤔"
    - phase: "了解"
      behavior: "阅读 README、文档、架构图"
      thought: "跨 session 编排是什么？"
      pain: "概念太新，需要理解编排层 ≠ 模型层"
      opportunity: "1 分钟 demo gif + 交互式 quickstart"
      emotion: "😕"
    - phase: "首次使用"
      behavior: "安装 → 运行 /bb"
      thought: "装好了，怎么开始？"
      pain: "需要 Reasonix 环境"
      opportunity: "安装脚本一步到位，首次任务模板化"
      emotion: "😊 / 😤"
    - phase: "持续使用"
      behavior: "日常用 /bb 和 /docs"
      thought: "比我自己指挥 AI 省心"
      pain: "管线跑太久需要等"
      opportunity: "通知 + 打断点 + 进度可视化"
      emotion: "😌 / 😅"
    - phase: "推荐"
      behavior: "向同事推荐"
      thought: "这个工具帮你组织 AI 团队"
      pain: "和 Cursor 有什么区别？难以一句话说清"
      opportunity: "提炼一句话对比"
      emotion: "😄 / 🤷"

