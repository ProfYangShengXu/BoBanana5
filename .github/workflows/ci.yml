name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install pyyaml pytest

      - name: Python syntax check
        run: |
          python -m py_compile bobanana.py pipeline_orchestrator.py
          python -m py_compile state_machine_engine.py state_machine_parser.py

      - name: Validate state machine
        run: python state_machine_parser.py validate state-machine.yaml

      - name: Verify registry
        run: python scripts/verify_registry.py

      - name: Run tests
        run: python -m pytest tests/u/test_handoff.py tests/u/test_core.py tests/i/test_state_machine_engine.py tests/perf/test_benchmark.py tests/chaos/test_resilience.py tests/security/test_scan.py tests/s/test_pipeline_e2e.py -v --tb=short
