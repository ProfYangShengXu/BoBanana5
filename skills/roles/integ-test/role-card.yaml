description: Integration test role
example_state_machine:
  description: integ-test 在架构师分配任务后执行，完成后交回架构师验收
  entry_phase: arch-done
  exit_phase: dev-done_task-done
  typical_pipeline:
  - architect
  - integ-test
  - architect(验收)
  - client-gate(CL)
input_contract:
- description: 传递给 integ-test 的任务输入
  name: task_input
  required: true
  type: object
- description: integ-test 需满足的 PRD acceptance 标准
  name: acceptance_criteria
  required: true
  type: object[]
- description: 上一个角色的交接工单上下文
  name: handoff_context
  required: false
  type: object
name: integ-test
output_contract:
- description: integ-test 的实现产出（代码/设计/配置）
  name: implementation
  type: object
- description: 测试结果（normal/boundary/adversarial 三路径）
  name: test_results
  type: object[]
- description: 7 维风险评估标注
  name: risk_notes
  type: object[]
quality_gates:
- check: 逐条核对 PRD acceptance
  desc: 所有 acceptance 已覆盖实现
  id: INTE-Q1
  layer: U
- check: grep TODO/FIXME/dead code
  desc: 无空壳函数和死代码
  id: INTE-Q2
  layer: U
- check: 行数检查
  desc: 每个函数 <= 30 行
  id: INTE-Q3
  layer: U
standards_file: standards-brief.yaml
tags: []
use_case: 适合Integration test role，可替代fullstack-dev在该领域的专门工作
