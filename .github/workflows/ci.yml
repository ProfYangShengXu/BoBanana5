name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - run: python state_machine_parser.py validate state-machine.yaml
      - run: python scripts/verify_registry.py
      - run: python -m unittest discover -s tests -p "test_handoff.py" -v
        continue-on-error: true
      - run: python -m unittest discover -s tests -p "test_registry.py" -v
        continue-on-error: true
      - run: python -m unittest discover -s tests -p "test_state_machine_engine.py" -v
        continue-on-error: true
      - run: python -m unittest discover -s tests -p "test_schema_compliance.py" -v
        continue-on-error: true
      - run: python -m unittest discover -s tests -p "test_resilience.py" -v
        continue-on-error: true
      - run: python -m unittest discover -s tests -p "test_benchmark.py" -v
        continue-on-error: true
      - run: python -m unittest discover -s tests -p "test_scan.py" -v
        continue-on-error: true
      - run: python -m unittest discover -s tests -p "test_pipeline_e2e.py" -v
        continue-on-error: true
      - run: python -m unittest discover -s tests -p "test_pipeline_deep.py" -v
        continue-on-error: true
      - run: python -m unittest discover -s tests -p "test_pipeline_full.py" -v
        continue-on-error: true
      - run: python -m unittest discover -s tests -p "test_multi_round.py" -v
        continue-on-error: true
