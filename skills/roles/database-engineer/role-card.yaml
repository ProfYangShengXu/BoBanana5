description: 'Database engineer: schema design, query optimization, migration, backup/recovery.
  MySQL/PostgreSQL/Redis'
input_contract:
- description: Task input for database-engineer
  name: task_input
  required: true
  type: object
- description: PRD acceptance criteria to fulfill
  name: acceptance_criteria
  required: true
  type: object[]
- description: Previous role handoff ticket with context
  name: handoff_context
  required: false
  type: object
name: database-engineer
output_contract:
- description: Implementation code/files produced by database-engineer
  name: implementation
  type: object
- description: Test results (normal/boundary/adversarial paths)
  name: test_results
  type: object[]
- description: Risk annotations per 7-dimension framework
  name: risk_notes
  type: object[]
quality_gates:
- check: Verify acceptance list
  desc: All acceptance criteria covered
  id: DATA-Q1
  layer: U
- check: grep for TODO/FIXME
  desc: No dead code or empty functions
  id: DATA-Q2
  layer: U
- check: Line count check
  desc: Each function <= 30 lines
  id: DATA-Q3
  layer: U
standards_file: SKILL.md
tags: []

use_case: "适合数据库Schema设计和查询优化"
