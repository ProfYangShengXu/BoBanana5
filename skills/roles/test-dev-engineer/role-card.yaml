description: 测试开发工程师：自动化测试框架搭建，单元/集成/场景/安全四层测试，CI/CD 集成，测试覆盖率分析与质量门禁
input_contract:
- description: 传递给 test-dev-engineer 的任务输入
  name: task_input
  required: true
  type: object
- description: test-dev-engineer 需满足的 PRD acceptance 标准
  name: acceptance_criteria
  required: true
  type: object[]
- description: 上一个角色的交接工单上下文
  name: handoff_context
  required: false
  type: object
name: test-dev-engineer
output_contract:
- description: test-dev-engineer 的实现产出（代码/设计/配置）
  name: implementation
  type: object
- description: 测试结果（normal/boundary/adversarial 三路径）
  name: test_results
  type: object[]
- description: 7 维风险评估标注
  name: risk_notes
  type: object[]
quality_gates:
- check: 逐条核对 PRD acceptance
  desc: 所有 acceptance 已覆盖实现
  id: TEST-Q1
  layer: U
- check: grep TODO/FIXME/dead code
  desc: 无空壳函数和死代码
  id: TEST-Q2
  layer: U
- check: 行数检查
  desc: 每个函数 <= 30 行
  id: TEST-Q3
  layer: U
standards_file: standards-brief.yaml
tags: []

use_case: "适合自动化测试框架搭建和四层测试覆盖"
