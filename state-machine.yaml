# 标准开发模板 v15 — 默认推荐
# 铁律：测试角色不修只报 → test-fail 一律给架构师审查 → 架构师更新状态机 → 专业角色修复

version: 15
entry_point: "boss"
max_loops: 50

nodes:
  - id: "boss"              tags: ["OP"]  is_op_role: true
  - id: "architect"         tags: ["OP"]  is_op_role: true
  - id: "backend-dev"       tags: []
  - id: "frontend-dev"      tags: []
  - id: "database-engineer" tags: []
  - id: "code-reviewer"     tags: []
  - id: "integration-tester" tags: []
  - id: "test-dev-engineer" tags: []
  - id: "chaos-engineer"    tags: []
  - id: "ai-test-strategist" tags: []
  - id: "security-engineer" tags: []
  - id: "tech-writer"       tags: []
  - id: "client-gate"       tags: ["CL"]  is_exit: true

edges:
  - from: "boss"            to: "architect"          phase: "boss-done"
  - from: "architect"       to: "architect"          phase: "arch-self-review"

  # 开发链
  - from: "architect"       to: "backend-dev"        phase: "arch-done"
  - from: "backend-dev"     to: "code-reviewer"      phase: "backend-done"
  - from: "code-reviewer"   to: "database-engineer"  phase: "cr-done"
  - from: "database-engineer" to: "code-reviewer"    phase: "db-done"
  - from: "code-reviewer"   to: "frontend-dev"       phase: "cr-pass"
  - from: "frontend-dev"    to: "code-reviewer"      phase: "frontend-done"

  # CR 打回 → 专业角色修复
  - from: "code-reviewer"   to: "backend-dev"        phase: "cr-fail-backend"
  - from: "code-reviewer"   to: "frontend-dev"       phase: "cr-fail-frontend"

  # CR通过 → 集成+测试
  - from: "code-reviewer"   to: "integration-tester" phase: "all-dev-done"
  - from: "integration-tester" to: "test-dev-engineer" phase: "integration-done"

  # 测试链：测试→混沌→AI测试
  - from: "test-dev-engineer"  to: "chaos-engineer"     phase: "test-all-pass"
  - from: "chaos-engineer"     to: "ai-test-strategist" phase: "chaos-done"

  # 【铁律】测试失败 → 只写badcase文档 → 推进给架构师审查（不直接修）
  - from: "test-dev-engineer"  to: "architect"        phase: "test-fail"
  - from: "integration-tester" to: "architect"        phase: "test-fail"
  - from: "chaos-engineer"     to: "architect"        phase: "chaos-fail"
  - from: "ai-test-strategist" to: "architect"        phase: "ai-test-fail"

  # AI测试通过 → 安全
  - from: "ai-test-strategist" to: "security-engineer" phase: "ai-test-pass"

  # 安全 → 文档 → 架构师终验 → CL
  - from: "security-engineer" to: "tech-writer"        phase: "security-done"
  - from: "tech-writer"       to: "architect"          phase: "docs-done"
  - from: "architect"         to: "client-gate"        phase: "arch-gate-pass"

  # 架构师打回给专业角色修复（更新状态机后）
  - from: "architect"         to: "backend-dev"        phase: "arch-gate-fail-backend"
  - from: "architect"         to: "frontend-dev"       phase: "arch-gate-fail-frontend"
  - from: "architect"         to: "database-engineer"  phase: "arch-gate-fail-db"

  # CL 出口
  - from: "client-gate"       to: "__terminal__"       phase: "cl-pass"  condition: {field: score, operator: ">=", value: 9}
  - from: "client-gate"       to: "architect"          phase: "cl-fail"  condition: {field: score, operator: "<", value: 9}
